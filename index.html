<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore - Cyberpunk Catalog</title>
    <style>
        /* Estilos Base y Cyberpunk */
        :root {
            --neon-cyan: #0ff;
            --neon-pink: #f0f;
            --neon-yellow: #ff0;
            --neon-red: #ff0055;
            --dark-bg: #050508;
            --panel-bg: rgba(10, 10, 15, 0.85);
            --grid-color: rgba(0, 255, 255, 0.07);
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--dark-bg);
            background-image: 
                linear-gradient(var(--grid-color) 2px, transparent 2px),
                linear-gradient(90deg, var(--grid-color) 2px, transparent 2px);
            background-size: 30px 30px;
            color: #e0e6ed;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Botón Flotante del Inventario (Carrito) */
        #cart-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #000;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            padding: 10px 20px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            transition: all 0.3s;
        }

        #cart-toggle:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        /* Panel Lateral del Carrito */
        #cart-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100vh;
            background: rgba(5, 5, 8, 0.95);
            border-left: 3px solid var(--neon-pink);
            z-index: 1001;
            transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(255, 0, 255, 0.15);
        }

        #cart-panel.active {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 2px dashed var(--neon-pink);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            margin: 0;
            color: var(--neon-pink);
            font-size: 1.5rem;
            text-shadow: 0 0 8px var(--neon-pink);
        }

        .btn-close {
            background: transparent;
            color: var(--neon-yellow);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            font-family: inherit;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-cyan);
            padding: 10px;
            margin-bottom: 15px;
            position: relative;
        }

        .cart-item h4 {
            margin: 0 0 5px 0;
            color: #fff;
            font-size: 1rem;
        }

        .cart-item p {
            margin: 2px 0;
            font-size: 0.85rem;
            color: #aaa;
        }

        .btn-remove {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            cursor: pointer;
            font-family: inherit;
        }

        .btn-remove:hover {
            background: var(--neon-red);
            color: #000;
        }

        .cart-footer {
            padding: 20px;
            border-top: 2px solid var(--neon-cyan);
            background: #000;
        }

        .cart-total {
            font-size: 1.5rem;
            color: var(--neon-yellow);
            font-weight: bold;
            text-align: right;
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--neon-yellow);
        }

        .btn-checkout {
            width: 100%;
            padding: 15px;
            background: var(--neon-cyan);
            color: #000;
            border: none;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        header {
            position: relative;
            background: linear-gradient(180deg, #000 70%, var(--dark-bg));
            border-bottom: 4px dashed var(--neon-cyan);
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 4rem;
            color: #fff;
            text-shadow: 3px 3px 0px var(--neon-pink), -3px -3px 0px var(--neon-cyan);
            letter-spacing: 8px;
        }

        header p {
            color: var(--neon-yellow);
            font-weight: bold;
            letter-spacing: 3px;
            margin-top: 10px;
        }

        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 35px;
        }

        .card {
            background-color: var(--panel-bg);
            border-left: 5px solid var(--neon-pink);
            border-right: 2px solid var(--neon-cyan);
            border-top: 2px solid var(--neon-cyan);
            border-bottom: 5px solid var(--neon-cyan);
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-left-color: var(--neon-yellow);
        }

        .badge-sku {
            background-color: #000;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 4px 10px;
            font-size: 0.85rem;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 15px;
            align-self: flex-start;
        }

        .badge-villain {
            color: var(--neon-red);
            border-color: var(--neon-red);
        }

        .card h2 {
            margin: 0 0 15px 0;
            font-size: 1.6rem;
            color: #fff;
            text-transform: uppercase;
            border-bottom: 2px dotted rgba(240, 0, 255, 0.4);
            padding-bottom: 5px;
        }

        .data-table {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0, 255, 255, 0.1);
            padding: 10px;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }

        .precio-box {
            background: linear-gradient(45deg, rgba(255,255,0,0.1), transparent);
            border: 1px solid var(--neon-yellow);
            padding: 10px;
            text-align: center;
            font-size: 1.8rem;
            color: var(--neon-yellow);
            font-weight: bold;
            margin: 20px 0;
        }

        .btn-action {
            width: 100%;
            background: transparent;
            color: #fff;
            border: 2px solid var(--neon-pink);
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: auto;
        }

        .btn-action:hover:not(:disabled) {
            background-color: var(--neon-pink);
            color: #000;
        }
    </style>
</head>
<body>

    <button id="cart-toggle" onclick="toggleCart()">[ INVENTARIO: 0 ]</button>

    <div id="cart-panel">
        <div class="cart-header">
            <h2>// INVENTARIO_LOCAL</h2>
            <button class="btn-close" onclick="toggleCart()">[X]</button>
        </div>
        <div class="cart-items" id="cart-items-container">
            </div>
        <div class="cart-footer">
            <div class="cart-total">TOTAL: $<span id="cart-total-price">0</span></div>
            <button class="btn-checkout" onclick="alert('Iniciando transferencia de créditos...')">CONFIRMAR_TRANSACCIÓN()</button>
        </div>
    </div>

    <header>
        <h1>GAMESTORE</h1>
        <p>SURVIVAL_HORROR</p>
    </header>

    <div class="container">
        <div class="grid" id="catalogo">
            </div>
    </div>

    <script>
        // Memoria Principal (Catálogo)
        const registrosResidentEvil = [
            { codigoSKU: "RE-LEON-04", personaje: "Leon S. Kennedy", juego: "RE4 Remake", tipo: "Figura Articulada", faccion: "Héroe", precio: 85000, stock: 12 },
            { codigoSKU: "RE-JILL-03", personaje: "Jill Valentine", juego: "RE3 Remake", tipo: "Estatua Premium", faccion: "Héroe", precio: 95000, stock: 4 },
            { codigoSKU: "RE-CHRIS-05", personaje: "Chris Redfield", juego: "Resident Evil 5", tipo: "Estatua Clásica", faccion: "Héroe", precio: 78000, stock: 18 },
            { codigoSKU: "BOW-TYRANT-01", personaje: "Tyrant (T-002)", juego: "Resident Evil 1", tipo: "Estatua Colosal", faccion: "Villano", precio: 140000, stock: 2 },
            { codigoSKU: "BOW-MRX-02", personaje: "Mr. X (T-103)", juego: "RE2 Remake", tipo: "Action Figure 1/6", faccion: "Villano", precio: 110000, stock: 7 },
            { codigoSKU: "BOW-NEMESIS-03", personaje: "Nemesis (T-Type)", juego: "RE3 Remake", tipo: "Figura Deluxe", faccion: "Villano", precio: 155000, stock: 5 },
            { codigoSKU: "BOW-SADDLER-04", personaje: "Osmund Saddler", juego: "RE4 Remake", tipo: "Estatua Diorama", faccion: "Villano", precio: 125000, stock: 0 },
            { codigoSKU: "BOW-WESKER-05", personaje: "Albert Wesker", juego: "Resident Evil 5", tipo: "Action Figure", faccion: "Villano", precio: 105000, stock: 8 },
            { codigoSKU: "BOW-BAKER-07", personaje: "Jack Baker", juego: "Resident Evil 7", tipo: "Figura Articulada", faccion: "Villano", precio: 89000, stock: 12 }
        ];

        // --- LÓGICA DEL CARRITO ---
        let carrito = []; // Nueva secuencia de registros para el inventario del usuario

        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('active');
        }

        function agregarAlCarrito(sku) {
            const productoCatalogo = registrosResidentEvil.find(reg => reg.codigoSKU === sku);
            
            // Buscamos si el registro ya existe en nuestro carrito
            const itemEnCarrito = carrito.find(item => item.codigoSKU === sku);

            if (itemEnCarrito) {
                // Validación para no comprar más del stock disponible
                if (itemEnCarrito.cantidad < productoCatalogo.stock) {
                    itemEnCarrito.cantidad++;
                } else {
                    alert('ERROR_SISTEMA: Capacidad máxima de suministro alcanzada para este archivo.');
                    return;
                }
            } else {
                // Insertamos un nuevo registro en el carrito con cantidad 1
                carrito.push({
                    codigoSKU: productoCatalogo.codigoSKU,
                    personaje: productoCatalogo.personaje,
                    precio: productoCatalogo.precio,
                    cantidad: 1
                });
            }
            actualizarInterfazCarrito();
            // Abrimos el panel automáticamente al agregar algo
            document.getElementById('cart-panel').classList.add('active'); 
        }

        function eliminarDelCarrito(sku) {
            carrito = carrito.filter(item => item.codigoSKU !== sku);
            actualizarInterfazCarrito();
        }

        function actualizarInterfazCarrito() {
            const contenedor = document.getElementById('cart-items-container');
            const totalPrecioObj = document.getElementById('cart-total-price');
            const btnToggle = document.getElementById('cart-toggle');
            
            contenedor.innerHTML = '';
            let total = 0;
            let cantidadTotal = 0;

            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                cantidadTotal += item.cantidad;

                contenedor.innerHTML += `
                    <div class="cart-item">
                        <button class="btn-remove" onclick="eliminarDelCarrito('${item.codigoSKU}')">X</button>
                        <h4>${item.personaje}</h4>
                        <p>ID: ${item.codigoSKU}</p>
                        <p>CANTIDAD: ${item.cantidad}</p>
                        <p style="color: var(--neon-cyan); font-weight: bold;">SUBTOTAL: $${subtotal.toLocaleString('es-AR')}</p>
                    </div>
                `;
            });

            totalPrecioObj.innerText = total.toLocaleString('es-AR');
            btnToggle.innerText = `[ INVENTARIO: ${cantidadTotal} ]`;
        }

        // --- RENDERIZADO DEL CATÁLOGO ---
        const catalogo = document.getElementById('catalogo');

        registrosResidentEvil.forEach(reg => {
            const esAgotado = reg.stock === 0;
            const badgeClass = reg.faccion === 'Villano' ? 'badge-sku badge-villain' : 'badge-sku';

            const cardHTML = `
                <div class="card">
                    <div class="${badgeClass}">ID_KEY: ${reg.codigoSKU}</div>
                    <h2>${reg.personaje}</h2>
                    <div class="data-table">
                        <div class="data-row"><span style="color:#8899a6">ORIGEN:</span><span style="color:var(--neon-cyan);">${reg.juego}</span></div>
                        <div class="data-row"><span style="color:#8899a6">CLASE:</span><span style="color:#fff">${reg.tipo}</span></div>
                        <div class="data-row"><span style="color:#8899a6">STOCK_ACTUAL:</span><span style="color:#fff">${esAgotado ? 'OUT OF STOCK' : reg.stock + ' UDS'}</span></div>
                    </div>
                    <div class="precio-box">$${reg.precio.toLocaleString('es-AR')}</div>
                    
                    <button class="btn-action" 
                            ${esAgotado ? 'disabled style="border-color:#555; color:#555; cursor:not-allowed;"' : ''} 
                            onclick="agregarAlCarrito('${reg.codigoSKU}')">
                        ${esAgotado ? 'ARCHIVO_BLOQUEADO()' : 'Agregar al carrito'}
                    </button>
                </div>
            `;
            catalogo.innerHTML += cardHTML;
        });
    </script>
</body>
</html>
